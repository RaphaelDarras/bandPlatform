  <style>
    :root {
      --spotify: #1DB954;
      --apple: #fc3c44;
      --youtube: #FF0000;
      --deezer: #A238FF;
      --accent: #960200;
      --light: #cacaca;
      --dark: #262324;
    }

    @font-face {
      font-family: 'Hewalk';
      src: url('../fonts/Hewalk - PERSONAL USE ONLY.ttf') format('truetype'),
           url('../fonts/Hewalk - PERSONAL USE ONLY.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-synthesis: none;
      font-display: swap;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background-color: var(--dark);
      background-image: url('../images/crownedArtwork.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(38, 35, 36, 0.55) 0%,
        rgba(38, 35, 36, 0.30) 35%,
        rgba(38, 35, 36, 0.65) 70%,
        rgba(38, 35, 36, 0.90) 100%
      );
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      padding: 1.5rem 1.5rem 2rem;
    }

    .band-name {
      font-family: 'Hewalk', sans-serif;
      font-size: clamp(1.5rem, 8vw, 2.5rem);
      font-weight: normal;
      font-synthesis: none;
      letter-spacing: 0.35em;
      line-height: 1;
      color: #fff;
      text-transform: lowercase;
      text-shadow: 0 1px 12px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,1);
      text-align: center;
    }

    .song-title {
      font-family: 'Hewalk', sans-serif;
      font-size: clamp(3.5rem, 18vw, 7rem);
      font-weight: normal;
      font-synthesis: none;
      letter-spacing: 0.08em;
      color: #fff;
      text-transform: lowercase;
      line-height: 1;
      text-align: center;
      margin-top: 0.15rem;
      text-shadow:
        0 2px 6px rgba(0,0,0,1),
        0 6px 24px rgba(0,0,0,1),
        0 0 60px rgba(150, 2, 0, 1),
        0 0 120px rgba(150, 2, 0, 0.8),
        0 0 200px rgba(150, 2, 0, 0.5);
    }

    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      padding: 1.1rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: clamp(0.9rem, 3.8vw, 1.05rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      border: none;
      transition: filter 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .platform-btn.primary {
      padding: 1.3rem 1.5rem;
      font-size: clamp(1rem, 4.2vw, 1.15rem);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .platform-btn:active {
      transform: scale(0.97);
    }

    .platform-btn:hover {
      filter: brightness(1.15);
    }

    .btn-spotify { background: var(--spotify); }
    .btn-apple { background: var(--apple); }
    .btn-youtube { background: var(--youtube); }
    .btn-deezer { background: var(--deezer); }

    .secondary-buttons {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    .secondary-buttons .platform-btn {
      padding: 0.85rem 1rem;
      font-size: clamp(0.75rem, 3vw, 0.85rem);
    }

    .btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .secondary-buttons .btn-icon {
      width: 18px;
      height: 18px;
    }

    .out-now {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      margin-top: 0.5rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
  </style>

  <script>
    // Fire ViewContent to properly track mid-funnel
    if (typeof fbq !== 'undefined') {
      fbq('track', 'ViewContent', { content_name: 'Crowned', content_type: 'music' });
    }

    function trackClick(platform) {
      if (typeof fbq !== 'undefined') {
        fbq('trackCustom', 'StreamingClick', { platform: platform });
        fbq('track', 'Lead', { content_name: 'Crowned', content_category: platform });
      }
    }

    // Deep-link handling for in-app browsers (Instagram, Facebook, etc.)
    (function () {
      var ua = navigator.userAgent || '';
      var isInAppBrowser = /FBAN|FBAV|Instagram|Line|Twitter|Snapchat/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var isMobile = isIOS || isAndroid;

      if (!isMobile) return;

      var deepLinks = {
        spotify: {
          ios: 'spotify:track:0tyZM3OawPGQc0heX67clL',
          android: 'intent://track/0tyZM3OawPGQc0heX67clL#Intent;scheme=spotify;package=com.spotify.music;S.browser_fallback_url=https%3A%2F%2Fopen.spotify.com%2Ftrack%2F0tyZM3OawPGQc0heX67clL;end',
          web: 'https://open.spotify.com/track/0tyZM3OawPGQc0heX67clL'
        },
        apple_music: {
          ios: 'music://music.apple.com/fr/album/crowned-single/1882024423',
          android: 'https://music.apple.com/fr/album/crowned-single/1882024423',
          web: 'https://music.apple.com/fr/album/crowned-single/1882024423'
        },
        youtube_music: {
          ios: 'vnd.youtube.music://music.youtube.com/watch?v=W9nIkv6OQaQ',
          android: 'intent://music.youtube.com/watch?v=W9nIkv6OQaQ#Intent;scheme=https;package=com.google.android.apps.youtube.music;S.browser_fallback_url=https%3A%2F%2Fmusic.youtube.com%2Fwatch%3Fv%3DW9nIkv6OQaQ;end',
          web: 'https://music.youtube.com/watch?v=W9nIkv6OQaQ'
        },
        deezer: {
          ios: 'deezer://',
          android: 'https://link.deezer.com/s/32Tc1Uol1QcblmXQNZ3b6',
          web: 'https://link.deezer.com/s/32Tc1Uol1QcblmXQNZ3b6'
        }
      };

      document.getElementById('buttons').addEventListener('click', function (e) {
        var btn = e.target.closest('[data-platform]');
        if (!btn) return;

        var platform = btn.getAttribute('data-platform');
        var links = deepLinks[platform];
        if (!links) return;

        // Only intercept in in-app browsers or for Spotify on any mobile browser
        if (!isInAppBrowser && platform !== 'spotify') return;

        e.preventDefault();

        var appUrl = isIOS ? links.ios : links.android;
        var webUrl = links.web;

        // On Android, intent URLs handle fallback natively
        if (isAndroid && appUrl.indexOf('intent://') === 0) {
          window.location.href = appUrl;
          return;
        }

        // On iOS, try app URI then fall back to web
        window.location.href = appUrl;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1500);
      });
    })();
  </script>
