      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;

      -webkit-tap-highlight-color: transparent;

    .crowned-btn__icon {

      height: 20px;

    .crowned-btn--primary {

<script>
  if (typeof fbq !== 'undefined') {
    fbq('track', 'ViewContent', { content_name: 'Crowned', content_type: 'music' });

  function trackClick(platform) {
    if (typeof fbq !== 'undefined') {
      fbq('trackCustom', 'StreamingClick', { platform: platform });
      fbq('track', 'Lead', { content_name: 'Crowned', content_category: platform });
    }
  }

  // Deep-link handling for in-app browsers (Instagram, Facebook, etc.)
  (function () {
    var ua = navigator.userAgent || '';
    var isInAppBrowser = /FBAN|FBAV|Instagram|Line|Twitter|Snapchat/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var isAndroid = /Android/i.test(ua);
    var isMobile = isIOS || isAndroid;

    if (!isMobile) return;

    var deepLinks = {
      spotify: {
        ios: 'spotify:track:0tyZM3OawPGQc0heX67clL',
        android: 'intent://track/0tyZM3OawPGQc0heX67clL#Intent;scheme=spotify;package=com.spotify.music;S.browser_fallback_url=https%3A%2F%2Fopen.spotify.com%2Ftrack%2F0tyZM3OawPGQc0heX67clL;end',

      },
      apple_music: {

      youtube_music: {

        web: 'https://music.youtube.com/watch?v=W9nIkv6OQaQ'
      },
      deezer: {
        ios: 'deezer://',
        android: 'https://link.deezer.com/s/32Tc1Uol1QcblmXQNZ3b6',
        web: 'https://link.deezer.com/s/32Tc1Uol1QcblmXQNZ3b6'
      }
    };

    document.getElementById('buttons').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-platform]');
      if (!btn) return;

      var platform = btn.getAttribute('data-platform');
      var links = deepLinks[platform];
      if (!links) return;

      if (!isInAppBrowser && platform !== 'spotify') return;

      e.preventDefault();

      var appUrl = isIOS ? links.ios : links.android;
      var webUrl = links.web;

      // Delay navigation by ~250ms so the Meta pixel beacon (queued by the
      // inline trackClick onclick) has time to send before the browser
      // unloads the page. Without this, StreamingClick / Lead events get
      // cancelled in-flight and never reach Meta.
      setTimeout(function () {
        if (isAndroid && appUrl.indexOf('intent://') === 0) {
          window.location.href = appUrl;
          return;
        }
        window.location.href = appUrl;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1500);
      }, 250);
    });
  })();
